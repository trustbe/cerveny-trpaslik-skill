<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Švitorka AI — Chrlím hlášky, tedy jsem.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root {
    --red: #c4342d;
    --red-hover: #e04038;
    --bg: #1a1a1e;
    --surface: #222226;
    --text: #e8e4df;
    --text-mid: #9a9590;
    --text-dim: #5a5652;
    --amber: #d4a04a;
  }

  html { height: 100%; }

  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* Top bar */
  .top-bar {
    padding: 14px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid #2a2a2e;
  }

  .top-bar .brand {
    color: var(--red);
  }

  .top-bar .status {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4a9;
    animation: blink 2.5s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* Main */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px 32px;
    position: relative;
    overflow: hidden;
  }

  /* K177 background watermark */
  .watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(140px, 28vw, 360px);
    font-weight: 700;
    color: #222226;
    letter-spacing: -0.03em;
    pointer-events: none;
    user-select: none;
    line-height: 1;
  }

  /* Content sits above watermark */
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 860px;
  }

  /* Character name */
  .who {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 28px;
  }

  /* The quote itself */
  .hlaska {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 700;
    font-size: clamp(26px, 4.5vw, 56px);
    line-height: 1.3;
    text-align: center;
    color: var(--text);
  }

  /* Czech-style quotes „ " */
  .hlaska::before {
    content: '\201E';
    color: var(--red);
    margin-right: 2px;
  }

  .hlaska::after {
    content: '\201C';
    color: var(--red);
    margin-left: 2px;
  }

  /* Episode info */
  .odkud {
    margin-top: 28px;
    font-size: 13px;
    color: var(--text-mid);
    letter-spacing: 0.05em;
  }

  .odkud .epizoda {
    color: var(--amber);
    font-weight: 600;
  }

  /* Button */
  .btn {
    margin-top: 52px;
    background: transparent;
    border: 2px solid var(--red);
    color: var(--red);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 14px 40px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  .btn:hover {
    background: var(--red);
    color: #fff;
  }

  .btn:active {
    background: var(--red-hover);
    border-color: var(--red-hover);
  }

  /* Bottom bar */
  .bottom {
    padding: 14px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    border-top: 1px solid #2a2a2e;
  }

  .bottom .specs {
    display: flex;
    gap: 20px;
  }

  .bottom .specs span {
    color: var(--text-mid);
  }

  .bottom a {
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.2s;
  }

  .bottom a:hover {
    color: var(--red);
  }

  /* Fade in */
  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .who     { animation: rise 0.5s ease-out both; }
  .hlaska  { animation: rise 0.5s ease-out 0.1s both; }
  .odkud   { animation: rise 0.5s ease-out 0.2s both; }
  .btn     { animation: rise 0.5s ease-out 0.3s both; }

  /* Mobile */
  @media (max-width: 640px) {
    .top-bar { padding: 12px 20px; font-size: 9px; }
    .main { padding: 40px 24px; }
    .watermark { font-size: 120px; }
    .bottom {
      flex-direction: column;
      gap: 6px;
      text-align: center;
      padding: 12px 20px;
    }
    .bottom .specs { flex-direction: column; gap: 2px; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <div><span class="brand">Švitorka AI</span> &mdash; Systém umělé inteligence K177</div>
  <div class="status"><span class="dot"></span> Online</div>
</div>

<div class="main">
  <div class="watermark">K177</div>
  <div class="content">
    <div class="who">Rimmer</div>
    <div class="hlaska">Jistě, že vím, co je láska. Mechanismus, jenž vynalezli bankéři, aby nás donutili přečerpat účet.</div>
    <div class="odkud">ep. 05 &mdash; <span class="epizoda">Sebevědomí a Mindrák</span></div>
    <button class="btn" onclick="location.reload()">Dali byste si hlášku?</button>
  </div>
</div>

<div class="bottom">
  <div class="specs">
    <span>Výrobce: Křápol a.s. &mdash; Taiwan</span>
    <span>Typ přístroje: Mluvící toastovač</span>
  </div>
  <div>
    <a href="https://github.com/trustbe/cerveny-trpaslik-skill">GitHub</a>
    &nbsp;&mdash;&nbsp;
    Chrlím hlášky, tedy jsem.
  </div>
</div>

</body>
</html>
