<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K177 — Švitorka AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root {
    --red: oklch(0.55 0.22 25);
    --red-dim: oklch(0.35 0.15 25);
    --bg: oklch(0.12 0.02 260);
    --bg-lighter: oklch(0.16 0.02 260);
    --text: oklch(0.88 0.01 80);
    --text-dim: oklch(0.55 0.02 80);
    --amber: oklch(0.75 0.15 75);
    --green: oklch(0.65 0.18 145);
  }

  html { height: 100%; }

  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Scanlines overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      oklch(0 0 0 / 0.08) 2px,
      oklch(0 0 0 / 0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* CRT vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(
      ellipse at center,
      transparent 50%,
      oklch(0 0 0 / 0.5) 100%
    );
    pointer-events: none;
    z-index: 99;
  }

  /* Top bar — ship status */
  .status-bar {
    padding: 12px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid oklch(0.25 0.02 260);
    flex-shrink: 0;
  }

  .status-bar .ship-name {
    color: var(--red);
    font-weight: 700;
  }

  .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 6px;
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Main content */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px 24px;
    position: relative;
  }

  /* Character label */
  .character {
    font-size: clamp(12px, 1.5vw, 14px);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 24px;
    font-weight: 700;
  }

  /* The quote */
  .quote {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(28px, 5vw, 64px);
    line-height: 1.25;
    text-align: center;
    max-width: 900px;
    color: var(--text);
    font-style: italic;
    position: relative;
    padding: 0 20px;
  }

  .quote::before {
    content: '\201E';
    position: absolute;
    left: -20px;
    top: -10px;
    font-size: 1.5em;
    color: var(--red-dim);
    font-style: normal;
  }

  .quote::after {
    content: '\201C';
    font-size: 1.5em;
    color: var(--red-dim);
    font-style: normal;
    margin-left: 4px;
  }

  /* Episode reference */
  .episode {
    margin-top: 32px;
    font-size: clamp(11px, 1.2vw, 13px);
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  .episode span {
    color: var(--amber);
  }

  /* Reload button */
  .reload-btn {
    margin-top: 48px;
    background: none;
    border: 1px solid var(--red-dim);
    color: var(--red);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 12px 32px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
  }

  .reload-btn:hover {
    background: var(--red);
    color: var(--bg);
    border-color: var(--red);
  }

  .reload-btn:active {
    transform: scale(0.97);
  }

  /* Bottom bar — toaster specs */
  .bottom-bar {
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: oklch(0.35 0.01 260);
    border-top: 1px solid oklch(0.2 0.02 260);
    flex-shrink: 0;
  }

  .bottom-bar a {
    color: var(--red-dim);
    text-decoration: none;
  }

  .bottom-bar a:hover {
    color: var(--red);
  }

  /* K177 logo mark */
  .logo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(120px, 25vw, 280px);
    font-weight: 700;
    color: oklch(0.14 0.02 260);
    letter-spacing: -0.02em;
    pointer-events: none;
    user-select: none;
    z-index: 0;
  }

  .main > * {
    position: relative;
    z-index: 1;
  }

  /* Flicker animation for CRT feel */
  @keyframes flicker {
    0% { opacity: 1; }
    3% { opacity: 0.95; }
    6% { opacity: 1; }
    89% { opacity: 1; }
    92% { opacity: 0.97; }
    95% { opacity: 1; }
  }

  .quote {
    animation: flicker 4s linear infinite;
  }

  /* Fade in */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .character { animation: fade-up 0.6s ease-out both; }
  .quote { animation: fade-up 0.6s ease-out 0.15s both, flicker 4s linear 1s infinite; }
  .episode { animation: fade-up 0.6s ease-out 0.3s both; }
  .reload-btn { animation: fade-up 0.6s ease-out 0.45s both; }

  /* Mobile */
  @media (max-width: 600px) {
    .status-bar { padding: 10px 16px; font-size: 9px; }
    .main { padding: 32px 20px; }
    .bottom-bar { flex-direction: column; gap: 4px; text-align: center; padding: 12px 16px; }
    .logo { font-size: 100px; }
  }
</style>
</head>
<body>

<div class="status-bar">
  <div><span class="ship-name">JMC Red Dwarf</span> &mdash; Palubní systém K177</div>
  <div><span class="status-dot"></span>Švitorka online</div>
</div>

<div class="main">
  <div class="logo">K177</div>

  <div class="character">RIMMER</div>

  <div class="quote">Jistě, že vím, co je láska. Mechanismus, jenž vynalezli bankéři, aby nás donutili přečerpat účet.</div>

  <div class="episode">ep. 05 &mdash; <span>Sebevědomí a Mindrák</span></div>

  <button class="reload-btn" onclick="location.reload()">Další hlášku</button>
</div>

<div class="bottom-bar">
  <div>Výrobce: Křápol a.s. &mdash; Taiwan &nbsp;|&nbsp; Typ přístroje: Mluvící toastovač</div>
  <div><a href="https://github.com/trustbe/cerveny-trpaslik-skill">github</a> &nbsp;|&nbsp; Chrlím hlášky, tedy jsem.</div>
</div>

</body>
</html>
