<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Švitorka AI — Chrlím hlášky, tedy jsem.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Michroma&family=VT323&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root {
    --red: #c4342d;
    --red-glow: #e8453e;
    --bg: #0c0c0f;
    --surface: #161619;
    --text: #e8e4df;
    --text-mid: #8a8580;
    --text-dim: #4a4642;
    --amber: #d4a04a;
    --green: #4a9a6a;
  }

  html { height: 100%; }

  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Michroma', sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* === TOP BAR — ship computer style === */
  .top-bar {
    padding: 14px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'VT323', monospace;
    font-size: 16px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid #1e1e22;
    background: var(--surface);
  }

  .top-bar .brand {
    color: var(--red);
    font-family: 'Michroma', sans-serif;
    font-size: 11px;
    letter-spacing: 0.25em;
  }

  .top-bar .k177 {
    color: var(--text-mid);
    font-family: 'VT323', monospace;
    font-size: 16px;
  }

  .top-bar .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'VT323', monospace;
    color: var(--green);
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: blink 2.5s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* === MAIN === */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px 32px;
    position: relative;
    overflow: hidden;
  }

  /* K177 watermark */
  .watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Michroma', sans-serif;
    font-size: clamp(140px, 28vw, 380px);
    font-weight: 400;
    color: #131316;
    letter-spacing: 0.05em;
    pointer-events: none;
    user-select: none;
    line-height: 1;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 860px;
  }

  /* === CHARACTER NAME — Microgramma style === */
  .who {
    font-family: 'Michroma', sans-serif;
    font-size: clamp(11px, 1.3vw, 14px);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 32px;
    position: relative;
  }

  /* Red line accents around character name */
  .who::before,
  .who::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 40px;
    height: 1px;
    background: var(--red);
    opacity: 0.4;
  }

  .who::before { right: calc(100% + 16px); }
  .who::after { left: calc(100% + 16px); }

  /* === THE QUOTE === */
  .hlaska {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 700;
    font-size: clamp(24px, 4.2vw, 52px);
    line-height: 1.35;
    text-align: center;
    color: var(--text);
  }

  .hlaska::before {
    content: '\201E';
    color: var(--red);
    opacity: 0.7;
  }

  .hlaska::after {
    content: '\201C';
    color: var(--red);
    opacity: 0.7;
  }

  /* === EPISODE — terminal font === */
  .odkud {
    margin-top: 28px;
    font-family: 'VT323', monospace;
    font-size: 20px;
    color: var(--text-mid);
    letter-spacing: 0.05em;
  }

  .odkud .epizoda {
    color: var(--amber);
  }

  /* === BUTTON — ship control style === */
  .btn {
    margin-top: 52px;
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red);
    font-family: 'Michroma', sans-serif;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 16px 44px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: -1px;
    border: 1px solid var(--red);
    opacity: 0;
    transform: scale(1.05);
    transition: all 0.25s ease;
  }

  .btn:hover {
    background: var(--red);
    color: #fff;
    box-shadow: 0 0 20px oklch(0.5 0.2 25 / 0.3);
  }

  .btn:hover::before {
    opacity: 0.3;
    transform: scale(1.08);
  }

  .btn:active {
    transform: scale(0.97);
  }

  /* === BOTTOM BAR === */
  .bottom {
    padding: 14px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'VT323', monospace;
    font-size: 15px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-dim);
    border-top: 1px solid #1e1e22;
    background: var(--surface);
  }

  .bottom .specs {
    display: flex;
    gap: 24px;
  }

  .bottom a {
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.2s;
  }

  .bottom a:hover {
    color: var(--red);
  }

  .bottom .tagline {
    color: var(--text-mid);
    font-style: italic;
  }

  /* === ANIMATIONS === */
  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .who     { animation: rise 0.5s ease-out both; }
  .hlaska  { animation: rise 0.5s ease-out 0.1s both; }
  .odkud   { animation: rise 0.5s ease-out 0.2s both; }
  .btn     { animation: rise 0.5s ease-out 0.3s both; }

  /* === MOBILE === */
  @media (max-width: 640px) {
    .top-bar {
      padding: 10px 16px;
      flex-direction: column;
      gap: 4px;
      text-align: center;
    }
    .main { padding: 40px 20px; }
    .watermark { font-size: 100px; }
    .who::before, .who::after { display: none; }
    .bottom {
      flex-direction: column;
      gap: 6px;
      text-align: center;
      padding: 12px 16px;
    }
    .bottom .specs { flex-direction: column; gap: 2px; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <span class="brand">Švitorka AI</span>
    &nbsp;&mdash;&nbsp;
    <span class="k177">Systém umělé inteligence K177</span>
  </div>
  <div class="status"><span class="dot"></span> ONLINE</div>
</div>

<div class="main">
  <div class="watermark">K177</div>
  <div class="content">
    <div class="who">Rimmer</div>
    <div class="hlaska">Jistě, že vím, co je láska. Mechanismus, jenž vynalezli bankéři, aby nás donutili přečerpat účet.</div>
    <div class="odkud">ep. 05 &mdash; <span class="epizoda">Sebevědomí a Mindrák</span></div>
    <button class="btn" onclick="location.reload()">Dali byste si hlášku?</button>
  </div>
</div>

<div class="bottom">
  <div class="specs">
    <span>Výrobce: Křápol a.s. &mdash; Taiwan</span>
    <span>Typ: Mluvící toastovač</span>
  </div>
  <div>
    <a href="https://github.com/trustbe/cerveny-trpaslik-skill">GitHub</a>
    &nbsp;&mdash;&nbsp;
    <span class="tagline">Chrlím hlášky, tedy jsem.</span>
  </div>
</div>

</body>
</html>
